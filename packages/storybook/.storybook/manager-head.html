<script>
  const lumenTitle = "Lumen AI Design System";

  const setLumenTitle = () => {
    if (document.title !== lumenTitle) {
      document.title = lumenTitle;
    }
  };

  setLumenTitle();

  new MutationObserver(setLumenTitle).observe(document.querySelector("title"), {
    childList: true
  });
</script>

  /* Root-level headings (e.g. "PRIMITIVES", "COMPOSITE") render a

  #storybook-explorer-tree [data-nodetype="root"] svg {

  /* Components/groups sitting directly under a root category (e.g.
     "ButtonGroup" under "Primitives") render a colored type-indicator

     four top-level categories in the repo map (see CLAUDE.md) — a

     (no DOM nesting), so depth has to be matched via data-parent-id

  #storybook-explorer-tree [data-nodetype="component"][data-parent-id="primitives"] svg[type="component"],
  #storybook-explorer-tree [data-nodetype="component"][data-parent-id="composite"] svg[type="component"],

  /* Controls addon panel's args-table inputs (Textarea/Select/text Input).

     first, in manager.ts) type-check but aren't actually consumed by
     these specific components, so this overrides the rendered CSS
     directly. This file only ever loads inside the manager document, not
     the preview iframe where @lumen/ui components actually render — an
     iframe's contents are a separate document a parent page's <style>
     cannot reach — so unscoped native-tag selectors are safe here without
     needing a (possibly version-specific, unverified) container id. */

  select,
  input[type="text"],
  input[type="number"] {
